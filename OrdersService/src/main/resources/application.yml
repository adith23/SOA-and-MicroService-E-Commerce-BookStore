server:
  port: 8081

spring:
  application:
    name: orders-service

  # OAuth2 Resource Server - validates JWT tokens issued by Spring Authorization Server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
          # JWK Set URI auto-discovered from issuer-uri via:
          # http://localhost:9000/.well-known/openid-configuration

  # RabbitMQ connection
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated   # producer confirms
    publisher-returns: true              # unroutable messages returned
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000

# RabbitMQ exchange and queue names (match rabbitmq/definitions.json)
rabbitmq:
  exchange: order.exchange
  routing-key:
    payment: order.payment

# Logging
logging:
  level:
    com.globalbooks: DEBUG
    org.springframework.security: INFO
    org.springframework.amqp: INFO
