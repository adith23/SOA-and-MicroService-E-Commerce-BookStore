version: '3.8'

services:

  # ── RabbitMQ (Message Broker / ESB) ────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: globalbooks-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AuthServer (Spring Authorization Server – OAuth2) ──────────────────
  auth-server:
    build:
      context: ./AuthServer
      dockerfile: Dockerfile
    container_name: globalbooks-auth
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── OrdersService (Spring Boot REST) ───────────────────────────────────
  orders-service:
    build:
      context: ./OrdersService
      dockerfile: Dockerfile
    container_name: globalbooks-orders
    ports:
      - "8081:8081"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://auth-server:9000
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth-server:
        condition: service_healthy

  # ── PaymentsService (Spring Boot + RabbitMQ consumer) ──────────────────
  payments-service:
    build:
      context: ./PaymentsService
      dockerfile: Dockerfile
    container_name: globalbooks-payments
    ports:
      - "8082:8082"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── ShippingService (Spring Boot + RabbitMQ consumer) ──────────────────
  shipping-service:
    build:
      context: ./ShippingService
      dockerfile: Dockerfile
    container_name: globalbooks-shipping
    ports:
      - "8083:8083"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:

# Note: CatalogService (WAR), Apache ODE (BPEL), and jUDDI run on Tomcat 9
# and are not included in Docker Compose because Tomcat 9 + ODE + jUDDI
# are best run natively to avoid javax.* / jakarta.* conflicts.
# They are started separately via: %CATALINA_HOME%\bin\startup.bat
